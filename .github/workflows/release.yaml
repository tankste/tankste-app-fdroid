name: Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Check required working directory"
        run: |
          if [[ $(pwd) != "/home/runner/work/tankste-app-fdroid/tankste-app-fdroid" ]]; then
              echo "Working directory is not /home/runner/work/tankste-app-fdroid/tankste-app-fdroid, but $(pwd)"
              exit 1
          fi

      - name: Read version from pubspec.yaml
        run: |
          appVersionBuild=$(sed -n -E 's/version:\ (.+)/\1/p' app/pubspec.yaml)
          version="${appVersionBuild%%+*}"
          
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: build-tools;34.0.0 ndk;28.1.13356709

      - name: Read Flutter version
        run: |
          flutterVersion=$(sed -n -E 's/flutter:\ (.+)/\1/p' app/pubspec.yaml)
          echo "FLUTTER_VERSION=$flutterVersion" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: "app/pubspec.yaml"

      - name: Setup pub cache path
        run: |
          echo "PUB_CACHE=$(pwd)/.pub-cache" >> "$GITHUB_ENV"

      - name: Define local.properties
        working-directory: app/
        run: |
          echo "flutter.sdk=${{ env.FLUTTER_ROOT }}" >> ./local.properties
          

      - name: Configure Flutter
        working-directory: app/
        run: |
          flutter config --no-analytics

      - name: Precache Flutter
        working-directory: app/
        run: |
          flutter precache --android

      - name: "Build universal app"
        working-directory: app/
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: "Build split APKs"
        working-directory: app/
        run: |
          flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Sign universal APK
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
        run: |
          echo "$KEYSTORE" | base64 -d > release.jks
          
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEYSTORE_ALIAS" \
            --key-pass env:KEYSTORE_ALIAS_PASSWORD \
            --out "app/build/app/outputs/flutter-apk/app-release.apk" \
            app/build/app/outputs/flutter-apk/app-release.apk

      - name: Sign ARM v7 APK
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
        run: |
          echo "$KEYSTORE" | base64 -d > release.jks
          
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEYSTORE_ALIAS" \
            --key-pass env:KEYSTORE_ALIAS_PASSWORD \
            --out "app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk" \
            app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Sign ARM v8 APK
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
        run: |
          echo "$KEYSTORE" | base64 -d > release.jks
          
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEYSTORE_ALIAS" \
            --key-pass env:KEYSTORE_ALIAS_PASSWORD \
            --out "app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" \
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Sign ARM x86 APK
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
        run: |
          echo "$KEYSTORE" | base64 -d > release.jks
          
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEYSTORE_ALIAS" \
            --key-pass env:KEYSTORE_ALIAS_PASSWORD \
            --out "app/build/app/outputs/flutter-apk/app-x86_64-release.apk" \
            app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: "Create release"
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          release_name: ${{ env.VERSION }}
          draft: true
          prerelease: false

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: tankste-fdroid-$VERSION-universal.apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload ARM APK
        uses: actions/upload-artifact@v4
        with:
          name: tankste-fdroid-$VERSION-arm.apk
          path: app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: tankste-fdroid-$VERSION-arm64.apk
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: tankste-fdroid-$VERSION-x86_64.apk
          path: app/build/app/outputs/flutter-apk/app-x86_64-release.apk
